name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes do SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Preparar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Compilar o APK (debug)
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publicar o APK para download
        uses: actions/upload-artifact@v4
        with:
          name: laser-treino-debug
          path: app/build/outputs/apk/debug/app-debug.apk
